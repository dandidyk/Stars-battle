<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stars Battle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d1a; }
    canvas { display: block; touch-action: none; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script>

// ─── CONSTANTS ─────────────────────────────────────────────────
const C = {
  BG:      0x0d0d1a,
  PLAYER:  0x4fc3f7,
  AI:      0xef5350,
  NEUTRAL: 0x555566,
  TEXT:    '#e0e8ff',
  SUBTEXT: '#888899',
};

const DIFFICULTY = {
  easy:   { stars: 8,  aiInterval: 2000 },
  normal: { stars: 12, aiInterval: 1200 },
  hard:   { stars: 16, aiInterval: 700  },
};

// ─── SHARED: starfield with twinkling ─────────────────────────
function createStarfield(scene) {
  const W   = scene.scale.width;
  const H   = scene.scale.height;
  const rng = new Phaser.Math.RandomDataGenerator(['stars']);

  for (let i = 0; i < 160; i++) {
    const x     = rng.between(0, W);
    const y     = rng.between(0, H);
    const r     = rng.between(1, 10) < 8 ? 0.8 : 1.5;
    const alpha = rng.realInRange(0.25, 0.85);

    // Use individual circle shapes so Tweens can animate alpha
    const dot = scene.add.circle(x, y, r, 0xffffff, alpha);

    // Only ~35% of stars twinkle, keeps it subtle
    if (rng.between(1, 100) <= 35) {
      const dur   = rng.between(1800, 4200);
      const delay = rng.between(0, 3000);
      scene.tweens.add({
        targets:  dot,
        alpha:    { from: alpha * 0.25, to: alpha },
        duration: dur,
        delay,
        yoyo:     true,
        repeat:   -1,
        ease:     'Sine.easeInOut',
      });
    }
  }
}

// ─── BOOT SCENE ────────────────────────────────────────────────
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }
  preload() {}
  create() { this.scene.start('Start'); }
}

// ─── START SCENE ───────────────────────────────────────────────
class StartScene extends Phaser.Scene {
  constructor() { super('Start'); }

  create() {
    const W = this.scale.width;
    const H = this.scale.height;

    createStarfield(this);

    this.add.text(W / 2, H * 0.30, 'STARS BATTLE', {
      fontSize: '46px',
      fontFamily: 'Arial Black, Arial',
      color: '#4fc3f7',
      stroke: '#0d0d1a',
      strokeThickness: 6,
    }).setOrigin(0.5);

    this.add.text(W / 2, H * 0.30 + 58, 'Conquer the galaxy', {
      fontSize: '18px',
      fontFamily: 'Arial',
      color: '#888899',
    }).setOrigin(0.5);

    this.add.text(W / 2, H * 0.62, 'TAP TO PLAY', {
      fontSize: '22px',
      fontFamily: 'Arial',
      color: '#4fc3f7',
    }).setOrigin(0.5);

    this.input.once('pointerdown', () => {
      this.scene.start('Game', { difficulty: 'normal' });
    });
  }
}

// ─── GAME SCENE ────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  init(data) {
    this.difficulty = data.difficulty || 'normal';
  }

  create() {
    const W = this.scale.width;
    const H = this.scale.height;

    createStarfield(this);

    const cfg    = DIFFICULTY[this.difficulty];
    this.stars   = generateStars(W, H, cfg.stars);

    // Draw stars as colored circles (shapes upgraded in Phase 3)
    this.starGfx = this.add.graphics();
    this.drawStars();
  }

  drawStars() {
    this.starGfx.clear();
    const colorMap = {
      [OWNER_NEUTRAL]: C.NEUTRAL,
      [OWNER_PLAYER]:  C.PLAYER,
      [OWNER_AI]:      C.AI,
    };
    for (const s of this.stars) {
      this.starGfx.fillStyle(colorMap[s.owner], 1);
      this.starGfx.fillCircle(s.x, s.y, s.radius);
    }
  }

  update(time, delta) {}
}

// ─── STAR GENERATION ───────────────────────────────────────────
const STAR_RADIUS_MIN = 18;
const STAR_RADIUS_MAX = 38;
const STAR_MARGIN     = 60;
const STAR_MIN_GAP    = 28;

const OWNER_NEUTRAL = -1;
const OWNER_PLAYER  =  0;
const OWNER_AI      =  1;

function buildStar(id, x, y, radius, owner) {
  const maxUnits  = Math.round(radius * 3);
  const regenRate = radius * 0.8 / STAR_RADIUS_MAX; // units/sec
  let units;
  if (owner === OWNER_PLAYER || owner === OWNER_AI) {
    units = Math.round(radius * 1.5);
  } else {
    units = Math.round(radius * 0.8); // small neutral garrison
  }
  return {
    id,
    x, y,
    radius,
    owner,
    units,
    regenRate,
    maxUnits,
    atkLevel: 0,
    defLevel: 0,
    rotation: 0,
    rotSpeed: (Math.random() * 0.3 + 0.1) * (Math.random() < 0.5 ? 1 : -1),
  };
}

function generateStars(W, H, count) {
  const rng    = new Phaser.Math.RandomDataGenerator([`map_${count}_${W}`]);
  const pts    = [];
  const tries  = 800;

  // Generate positions with rejection sampling
  for (let i = 0; i < count; i++) {
    const r = rng.between(STAR_RADIUS_MIN, STAR_RADIUS_MAX);
    for (let t = 0; t < tries; t++) {
      const x = rng.between(STAR_MARGIN + r, W - STAR_MARGIN - r);
      const y = rng.between(STAR_MARGIN + r, H - STAR_MARGIN - r);
      let ok = true;
      for (const s of pts) {
        if (Math.hypot(x - s.x, y - s.y) < s.r + r + STAR_MIN_GAP) { ok = false; break; }
      }
      if (ok) { pts.push({ x, y, r }); break; }
    }
  }

  // Assign player = largest star in left half, AI = largest in right half
  const leftPts  = pts.filter(p => p.x < W / 2).sort((a, b) => b.r - a.r);
  const rightPts = pts.filter(p => p.x >= W / 2).sort((a, b) => b.r - a.r);

  const playerPt = leftPts[0];
  const aiPt     = rightPts[0];

  return pts.map((p, i) => {
    let owner = OWNER_NEUTRAL;
    if (p === playerPt) owner = OWNER_PLAYER;
    if (p === aiPt)     owner = OWNER_AI;
    return buildStar(i, p.x, p.y, p.r, owner);
  });
}

// ─── PHASER CONFIG ─────────────────────────────────────────────
const config = {
  type: Phaser.AUTO,
  backgroundColor: '#0d0d1a',
  scene: [BootScene, StartScene, GameScene],
  scale: {
    mode: Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: window.innerWidth,
    height: window.innerHeight,
  },
  render: {
    antialias: true,
    pixelArt: false,
    resolution: Math.min(window.devicePixelRatio || 1, 2),
  },
  input: {
    activePointers: 3,
  },
};

const game = new Phaser.Game(config);

window.addEventListener('resize', () => {
  game.scale.resize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stars Battle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d1a; }
    canvas { display: block; touch-action: none; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script>

// ─── CONSTANTS ─────────────────────────────────────────────────
const C = {
  BG:      0x0d0d1a,
  PLAYER:  0x4fc3f7,
  AI:      0xef5350,
  NEUTRAL: 0x555566,
  TEXT:    '#e0e8ff',
  SUBTEXT: '#888899',
};

const DIFFICULTY = {
  easy:   { stars: 8,  aiInterval: 2000 },
  normal: { stars: 12, aiInterval: 1200 },
  hard:   { stars: 16, aiInterval: 700  },
};

// ─── SHARED: draw starfield on any scene ───────────────────────
function createStarfield(scene) {
  const W = scene.scale.width;
  const H = scene.scale.height;
  const gfx = scene.add.graphics();

  const rng = new Phaser.Math.RandomDataGenerator(['stars']);

  for (let i = 0; i < 160; i++) {
    const x     = rng.between(0, W);
    const y     = rng.between(0, H);
    const r     = rng.between(1, 10) < 8 ? 0.8 : 1.4; // mostly tiny, few bigger
    const alpha = rng.realInRange(0.25, 0.85);
    gfx.fillStyle(0xffffff, alpha);
    gfx.fillCircle(x, y, r);
  }

  return gfx;
}

// ─── BOOT SCENE ────────────────────────────────────────────────
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }
  preload() {}
  create() { this.scene.start('Start'); }
}

// ─── START SCENE ───────────────────────────────────────────────
class StartScene extends Phaser.Scene {
  constructor() { super('Start'); }

  create() {
    const W = this.scale.width;
    const H = this.scale.height;

    createStarfield(this);

    this.add.text(W / 2, H * 0.30, 'STARS BATTLE', {
      fontSize: '46px',
      fontFamily: 'Arial Black, Arial',
      color: '#4fc3f7',
      stroke: '#0d0d1a',
      strokeThickness: 6,
    }).setOrigin(0.5);

    this.add.text(W / 2, H * 0.30 + 58, 'Conquer the galaxy', {
      fontSize: '18px',
      fontFamily: 'Arial',
      color: '#888899',
    }).setOrigin(0.5);

    this.add.text(W / 2, H * 0.62, 'TAP TO PLAY', {
      fontSize: '22px',
      fontFamily: 'Arial',
      color: '#4fc3f7',
    }).setOrigin(0.5);

    this.input.once('pointerdown', () => {
      this.scene.start('Game', { difficulty: 'normal' });
    });
  }
}

// ─── GAME SCENE ────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  init(data) {
    this.difficulty = data.difficulty || 'normal';
  }

  create() {
    const W = this.scale.width;
    const H = this.scale.height;

    createStarfield(this);

    // Placeholder text — removed when real game objects arrive
    this.add.text(W / 2, H / 2, 'GAME SCENE', {
      fontSize: '28px',
      fontFamily: 'Arial',
      color: '#4fc3f7',
    }).setOrigin(0.5);

    this.add.text(W / 2, H / 2 + 50, `Difficulty: ${this.difficulty}`, {
      fontSize: '18px',
      fontFamily: 'Arial',
      color: '#888899',
    }).setOrigin(0.5);

    this.input.once('pointerdown', () => {
      this.scene.start('Start');
    });
  }

  update(time, delta) {}
}

// ─── PHASER CONFIG ─────────────────────────────────────────────
const config = {
  type: Phaser.AUTO,
  backgroundColor: '#0d0d1a',
  scene: [BootScene, StartScene, GameScene],
  scale: {
    mode: Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: window.innerWidth,
    height: window.innerHeight,
  },
  render: {
    antialias: true,
    pixelArt: false,
    resolution: Math.min(window.devicePixelRatio || 1, 2),
  },
  input: {
    activePointers: 3,
  },
};

const game = new Phaser.Game(config);

window.addEventListener('resize', () => {
  game.scale.resize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>

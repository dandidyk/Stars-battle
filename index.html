<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stars Battle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d1a; }
    canvas { display: block; touch-action: none; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
// CONSTANTS
// ============================================================
const PLAYER_ID  = 0;
const AI_ID      = 1;
const NEUTRAL_ID = -1;

const COLORS = { [NEUTRAL_ID]: '#555566', [PLAYER_ID]: '#4fc3f7', [AI_ID]: '#ef5350' };

const SHIP_SPEED        = 130;          // px/sec
const ROUTE_DISPATCH_MS = 900;          // ms between ship dispatches per route
const COMBAT_RANGE_MULT = 2.2;          // combat zone = star.radius * this
const ORBIT_RADIUS_MULT = 1.38;         // orbit ring = star.radius * this
const MAX_ORBIT_SHIPS   = 15;
const CLUSTER_SPAN      = Math.PI * 0.6;
const UPGRADE_COSTS     = [12, 22, 35]; // cost for upgrade levels 1, 2, 3
const SWIPE_MIN_LEN     = 38;           // px minimum to count as swipe-cut
const TAP_MAX_MOVE      = 14;           // px max travel to count as tap
const TAP_MAX_MS        = 280;          // ms max duration to count as tap
const MIN_STAR_RADIUS   = 20;
const MAX_STAR_RADIUS   = 44;
const STAR_BASE_REGEN   = 1.0;
const MAX_AI_ROUTES     = 6;

const DIFFICULTY = {
  easy:   { stars: 8,  aiInterval: 2200, attackThreshold: 1.5, minSend: 18, aggression: 0.3, sendRatio: 0.5 },
  normal: { stars: 12, aiInterval: 1100, attackThreshold: 1.1, minSend: 10, aggression: 0.9, sendRatio: 0.5 },
  hard:   { stars: 16, aiInterval:  550, attackThreshold: 0.8, minSend:  6, aggression: 1.6, sendRatio: 0.65 },
};

// ============================================================
// STATE
// ============================================================
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
let logW, logH, dpr;

let state = {
  phase:        'START',  // START | PLAYING | WIN | LOSE
  stars:        [],
  routes:       [],       // persistent channels between stars
  ships:        [],       // individual ships in flight
  routeCounter: 0,
  shipCounter:  0,
  upgradePanel: null,     // starId of open upgrade panel, or null
  pointerDown:  null,     // { x, y, time, startedOnStar: id|null }
  dragFrom:     null,
  dragPos:      null,
  aiTimer:      0,
  lastTime:     0,
  tick:         0,
  difficulty:   'normal',
};

let starfield   = [];
let diffButtons = [];  // hit areas for start-screen buttons

// ============================================================
// CANVAS SETUP
// ============================================================
function resizeCanvas() {
  dpr  = Math.min(window.devicePixelRatio || 1, 2);
  logW = window.innerWidth;
  logH = window.innerHeight;
  canvas.width        = logW * dpr;
  canvas.height       = logH * dpr;
  canvas.style.width  = logW + 'px';
  canvas.style.height = logH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  buildStarfield();
}

function buildStarfield() {
  starfield = [];
  const n = Math.floor(logW * logH / 1800);
  for (let i = 0; i < n; i++) {
    starfield.push({
      x: Math.random() * logW,
      y: Math.random() * logH,
      r: Math.random() * 1.4 + 0.3,
      alpha: Math.random() * 0.55 + 0.15,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

// ============================================================
// MAP GENERATION
// ============================================================
function tryPlaceStar(existing, margin) {
  for (let attempt = 0; attempt < 250; attempt++) {
    const r = Math.random() * (MAX_STAR_RADIUS - MIN_STAR_RADIUS) + MIN_STAR_RADIUS;
    const x = margin + r + Math.random() * (logW - 2 * (r + margin));
    const y = margin + r + Math.random() * (logH - 2 * (r + margin));
    let ok = true;
    for (const s of existing) {
      if (Math.hypot(x - s.x, y - s.y) < s.radius + r + 28) { ok = false; break; }
    }
    if (ok) return { x, y, r };
  }
  return null;
}

function makeStar(id, x, y, radius, owner) {
  return {
    id,
    x, y,
    radius,
    owner,
    units:     Math.floor(radius * (owner === NEUTRAL_ID ? 0.7 : 1.5)),
    regenRate: (radius / MAX_STAR_RADIUS) * STAR_BASE_REGEN,
    maxUnits:  Math.floor(radius * 3.2),
    atkLevel:  0,
    defLevel:  0,
    rotation:  Math.random() * Math.PI * 2,
    rotSpeed:  (Math.random() * 0.3 + 0.08) * (Math.random() < 0.5 ? 1 : -1),
  };
}

function initGame(difficulty) {
  const cfg = DIFFICULTY[difficulty];
  state.difficulty  = difficulty;
  state.stars       = [];
  state.routes      = [];
  state.ships       = [];
  state.routeCounter = 0;
  state.shipCounter  = 0;
  state.upgradePanel = null;
  state.pointerDown  = null;
  state.dragFrom    = null;
  state.dragPos     = null;
  state.aiTimer     = cfg.aiInterval;
  state.lastTime    = 0;

  // Place stars
  const margin = 24;
  for (let i = 0; i < cfg.stars; i++) {
    const p = tryPlaceStar(state.stars, margin);
    if (!p) continue;
    state.stars.push(makeStar(state.stars.length, p.x, p.y, p.r, NEUTRAL_ID));
  }

  if (state.stars.length < 3) {
    // Fallback: place guaranteed stars on a grid if random failed
    state.stars = [];
    const cols = 4, rows = 3;
    for (let r = 0; r < rows && state.stars.length < cfg.stars; r++) {
      for (let c = 0; c < cols && state.stars.length < cfg.stars; c++) {
        const x = (logW / (cols + 1)) * (c + 1);
        const y = (logH / (rows + 1)) * (r + 1);
        const radius = MIN_STAR_RADIUS + Math.random() * (MAX_STAR_RADIUS - MIN_STAR_RADIUS);
        state.stars.push(makeStar(state.stars.length, x, y, radius, NEUTRAL_ID));
      }
    }
  }

  // Assign player star: biggest on left third
  const leftHalf = state.stars.filter(s => s.x < logW * 0.38);
  const pStar = leftHalf.length
    ? leftHalf.reduce((a, b) => a.radius > b.radius ? a : b)
    : state.stars[0];
  pStar.owner = PLAYER_ID;
  pStar.units = Math.floor(pStar.radius * 1.5);

  // Assign AI star: biggest on right third, not same as player
  const rightHalf = state.stars.filter(s => s.x > logW * 0.62 && s !== pStar);
  const aStar = rightHalf.length
    ? rightHalf.reduce((a, b) => a.radius > b.radius ? a : b)
    : state.stars.find(s => s !== pStar) || state.stars[state.stars.length - 1];
  if (aStar && aStar !== pStar) {
    aStar.owner = AI_ID;
    aStar.units = Math.floor(aStar.radius * 1.5);
  }

  state.phase = 'PLAYING';
}

// ============================================================
// ROUTES
// ============================================================
function createRoute(owner, fromId, toId) {
  if (fromId === toId) return;
  const from = state.stars[fromId];
  if (!from || from.owner !== owner) return;
  // No duplicate routes for same owner+pair
  if (state.routes.some(r => r.owner === owner && r.fromStar === fromId && r.toStar === toId)) return;
  state.routes.push({
    id:            state.routeCounter++,
    owner,
    fromStar:      fromId,
    toStar:        toId,
    dispatchTimer: 0,
    dashOffset:    0,
    _dead:         false,
  });
}

function deleteRoute(id) {
  const r = state.routes.find(r => r.id === id);
  if (r) r._dead = true;
}

function updateRoutes(dt) {
  const dashCycle = 16;
  for (const route of state.routes) {
    if (route._dead) continue;
    const src = state.stars[route.fromStar];
    const tgt = state.stars[route.toStar];
    // Auto-clean: source no longer belongs to this route's owner
    if (!src || src.owner !== route.owner) { route._dead = true; continue; }
    // Auto-clean: target already captured by route owner
    if (tgt && tgt.owner === route.owner) { route._dead = true; continue; }
    // Animate dash flow toward target
    route.dashOffset = (route.dashOffset + 45 * dt) % dashCycle;
    // Dispatch one ship at interval
    route.dispatchTimer -= dt * 1000;
    if (route.dispatchTimer <= 0) {
      route.dispatchTimer += ROUTE_DISPATCH_MS;
      if (src.units > 1.5) {
        src.units -= 1;
        spawnShip(route.owner, route.fromStar, route.toStar);
      }
    }
  }
  state.routes = state.routes.filter(r => !r._dead);
}

// ============================================================
// SHIPS
// ============================================================
function spawnShip(owner, fromId, toId) {
  const from = state.stars[fromId];
  const to   = state.stars[toId];
  if (!from || !to) return;
  state.ships.push({
    id:       state.shipCounter++,
    owner,
    fromStar: fromId,
    toStar:   toId,
    x:        from.x,
    y:        from.y,
    progress: 0,
    angle:    Math.atan2(to.y - from.y, to.x - from.x),
    inCombat: false,
  });
}

function atkPower(ship) {
  const src = state.stars[ship.fromStar];
  return 1 + (src ? src.atkLevel : 0) * 0.25;
}

function resolveCombat(ship, targetStar) {
  // Attacker always dies in combat zone, takes (atkPower / defStrength) defenders with it
  const dmg = atkPower(ship) / (1 + targetStar.defLevel * 0.25);
  targetStar.units = Math.max(0, targetStar.units - dmg);
}

function resolveArrival(ship) {
  const to = state.stars[ship.toStar];
  if (!to) return;
  if (to.owner === ship.owner) {
    to.units = Math.min(to.units + 1, to.maxUnits);
  } else {
    const dmg = atkPower(ship) / (1 + to.defLevel * 0.25);
    to.units -= dmg;
    if (to.units <= 0) {
      to.owner   = ship.owner;
      to.units   = Math.abs(to.units);
      to.atkLevel = 0;
      to.defLevel = 0;
      // Remove captor's own routes to this star (already won)
      state.routes = state.routes.filter(r => !(r.toStar === to.id && r.owner === ship.owner));
    }
  }
}

function updateShips(dt) {
  for (let i = state.ships.length - 1; i >= 0; i--) {
    const ship = state.ships[i];
    const from = state.stars[ship.fromStar];
    const to   = state.stars[ship.toStar];
    if (!from || !to) { state.ships.splice(i, 1); continue; }

    const dist = Math.hypot(to.x - from.x, to.y - from.y);
    if (dist < 1) { resolveArrival(ship); state.ships.splice(i, 1); continue; }

    ship.progress += (SHIP_SPEED * dt) / dist;
    ship.x = from.x + (to.x - from.x) * Math.min(ship.progress, 1);
    ship.y = from.y + (to.y - from.y) * Math.min(ship.progress, 1);

    // Enter combat zone
    if (!ship.inCombat && Math.hypot(ship.x - to.x, ship.y - to.y) <= to.radius * COMBAT_RANGE_MULT) {
      ship.inCombat = true;
    }

    // Fight defenders in combat zone (only vs defended enemy star)
    if (ship.inCombat && ship.owner !== to.owner && to.owner !== NEUTRAL_ID && to.units >= 1) {
      resolveCombat(ship, to);
      state.ships.splice(i, 1);
      continue;
    }

    if (ship.progress >= 1) {
      resolveArrival(ship);
      state.ships.splice(i, 1);
    }
  }
}

// ============================================================
// GAME LOGIC
// ============================================================
function spawnFleet(owner, fromId, toId, units) {
  const from = state.stars[fromId];
  const to   = state.stars[toId];
  if (!from || !to || units < 1) return;

  const dotCount = Math.min(12, Math.max(3, Math.ceil(Math.log2(units + 1))));
  const dots = [];
  for (let i = 0; i < dotCount; i++) {
    const a = Math.random() * Math.PI * 2;
    const d = Math.random() * 9;
    dots.push({ ox: Math.cos(a) * d, oy: Math.sin(a) * d, phase: Math.random() * Math.PI * 2 });
  }

  state.fleets.push({
    id:       state.fleetCounter++,
    owner,
    fromStar: fromId,
    toStar:   toId,
    units,
    x:        from.x,
    y:        from.y,
    progress: 0,
    dots,
  });
}

function playerSendFleet(fromId, toId) {
  if (fromId === toId) return;
  const from = state.stars[fromId];
  if (!from || from.owner !== PLAYER_ID) return;
  const units = Math.floor(from.units * FLEET_SEND_RATIO);
  if (units < 1) return;
  from.units -= units;
  spawnFleet(PLAYER_ID, fromId, toId, units);
}

function landFleet(fleet) {
  const target = state.stars[fleet.toStar];
  if (!target) return;
  if (target.owner === fleet.owner) {
    target.units = Math.min(target.units + fleet.units, target.maxUnits);
  } else {
    target.units -= fleet.units;
    if (target.units < 0) {
      target.owner  = fleet.owner;
      target.units  = Math.min(Math.abs(target.units), target.maxUnits);
    }
  }
}

function updateRegen(dt) {
  for (const s of state.stars) {
    if (s.owner !== NEUTRAL_ID) {
      s.units = Math.min(s.units + s.regenRate * dt, s.maxUnits);
      s.rotation += s.rotSpeed * dt;
    }
  }
}

function updateFleets(dt) {
  for (let i = state.fleets.length - 1; i >= 0; i--) {
    const f    = state.fleets[i];
    const from = state.stars[f.fromStar];
    const to   = state.stars[f.toStar];
    if (!from || !to) { state.fleets.splice(i, 1); continue; }

    const dist = Math.hypot(to.x - from.x, to.y - from.y);
    if (dist < 1) { landFleet(f); state.fleets.splice(i, 1); continue; }

    f.progress += (UNIT_SPEED * dt) / dist;
    if (f.progress >= 1) {
      landFleet(f);
      state.fleets.splice(i, 1);
    } else {
      f.x = from.x + (to.x - from.x) * f.progress;
      f.y = from.y + (to.y - from.y) * f.progress;
    }
  }
}

function checkWinLose() {
  const pStars  = state.stars.some(s => s.owner === PLAYER_ID);
  const pFleets = state.fleets.some(f => f.owner === PLAYER_ID);
  if (!pStars && !pFleets) { state.phase = 'LOSE'; return; }

  const aiStars  = state.stars.some(s => s.owner === AI_ID);
  const aiFleets = state.fleets.some(f => f.owner === AI_ID);
  if (!aiStars && !aiFleets) { state.phase = 'WIN'; }
}

// ============================================================
// AI
// ============================================================
function aiThink() {
  const cfg     = DIFFICULTY[state.difficulty];
  const myStars = state.stars.filter(s => s.owner === AI_ID);
  if (!myStars.length) return;

  // Clean up stale routes (lost source or already captured target)
  for (const r of state.routes) {
    if (r.owner !== AI_ID || r._dead) continue;
    const src = state.stars[r.fromStar];
    const tgt = state.stars[r.toStar];
    if (!src || src.owner !== AI_ID) { r._dead = true; continue; }
    if (tgt && tgt.owner === AI_ID)  { r._dead = true; }
  }

  // Cap total AI routes
  const activeAiRoutes = state.routes.filter(r => r.owner === AI_ID && !r._dead);
  if (activeAiRoutes.length >= MAX_AI_ROUTES) return;

  // Defensive: reinforce a star under attack
  for (const star of myStars) {
    const underAttack = state.ships.some(s => s.owner !== AI_ID && s.toStar === star.id);
    if (!underAttack) continue;
    const helper = myStars
      .filter(s => s !== star && s.units > cfg.minSend * 2)
      .sort((a, b) => Math.hypot(a.x - star.x, a.y - star.y) - Math.hypot(b.x - star.x, b.y - star.y))[0];
    if (helper && !state.routes.some(r => r.owner === AI_ID && r.fromStar === helper.id && r.toStar === star.id)) {
      createRoute(AI_ID, helper.id, star.id);
      return;
    }
  }

  // Offensive: score targets and create best route
  let best = null, bestScore = -Infinity;
  for (const src of myStars) {
    if (src.units < cfg.minSend) continue;
    for (const tgt of state.stars) {
      if (tgt.owner === AI_ID) continue;
      if (state.routes.some(r => r.owner === AI_ID && r.fromStar === src.id && r.toStar === tgt.id)) continue;
      const power = src.units / Math.max(tgt.units + 1, 1);
      if (power < cfg.attackThreshold) continue;
      const dist  = Math.hypot(src.x - tgt.x, src.y - tgt.y);
      const score = power
        + (tgt.radius / MAX_STAR_RADIUS) * 1.8
        - dist * 0.0008
        + (tgt.owner === PLAYER_ID ? cfg.aggression : 0);
      if (score > bestScore) { bestScore = score; best = { src, tgt }; }
    }
  }
  if (best) createRoute(AI_ID, best.src.id, best.tgt.id);
}

// ============================================================
// INPUT
// ============================================================
function bindInput() {
  canvas.addEventListener('touchstart',  onDown, { passive: false });
  canvas.addEventListener('touchmove',   onMove, { passive: false });
  canvas.addEventListener('touchend',    onUp,   { passive: false });
  canvas.addEventListener('touchcancel', onUp,   { passive: false });
  canvas.addEventListener('mousedown',   onDown);
  canvas.addEventListener('mousemove',   onMove);
  canvas.addEventListener('mouseup',     onUp);
}

function ptFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const src  = e.touches ? (e.touches[0] || e.changedTouches[0]) : e;
  return {
    x: (src.clientX - rect.left) * (logW / rect.width),
    y: (src.clientY - rect.top)  * (logH / rect.height),
  };
}

function starAt(x, y) {
  for (const s of state.stars) {
    if (Math.hypot(x - s.x, y - s.y) < s.radius + 10) return s;
  }
  return null;
}

function segmentsIntersect(ax, ay, bx, by, cx, cy, dx, dy) {
  const d1x = bx - ax, d1y = by - ay;
  const d2x = dx - cx, d2y = dy - cy;
  const cross = d1x * d2y - d1y * d2x;
  if (Math.abs(cross) < 1e-8) return false;
  const t = ((cx - ax) * d2y - (cy - ay) * d2x) / cross;
  const u = ((cx - ax) * d1y - (cy - ay) * d1x) / cross;
  return t >= 0 && t <= 1 && u >= 0 && u <= 1;
}

function upgradeButtonAt(x, y, starId) {
  const s = state.stars[starId];
  if (!s) return null;
  const pw = 116, ph = 58;
  const px = Math.max(4, Math.min(logW - pw - 4, s.x - pw / 2));
  const py = Math.max(4, Math.min(logH - ph - 4, s.y + s.radius + 10));
  if (x < px || x > px + pw || y < py || y > py + ph) return null;
  return x < px + pw / 2 ? 'atk' : 'def';
}

function applyUpgrade(starId, type) {
  const s = state.stars[starId];
  if (!s || s.owner !== PLAYER_ID) return;
  const lv = type === 'atk' ? s.atkLevel : s.defLevel;
  if (lv >= 3) return;
  const cost = UPGRADE_COSTS[lv];
  if (s.units < cost + 1) return;
  s.units -= cost;
  if (type === 'atk') s.atkLevel++;
  else                s.defLevel++;
}

function handleTap(x, y) {
  if (state.upgradePanel !== null) {
    const btn = upgradeButtonAt(x, y, state.upgradePanel);
    if (btn) { applyUpgrade(state.upgradePanel, btn); return; }
    state.upgradePanel = null;
    // fall through: maybe opening a different star's panel
  }
  const s = starAt(x, y);
  if (s && s.owner === PLAYER_ID) {
    state.upgradePanel = (state.upgradePanel === s.id) ? null : s.id;
  }
}

function onDown(e) {
  e.preventDefault();
  const pt = ptFromEvent(e);

  if (state.phase === 'WIN' || state.phase === 'LOSE') { state.phase = 'START'; return; }
  if (state.phase === 'START') {
    for (const btn of diffButtons) {
      if (pt.x >= btn.x && pt.x <= btn.x + btn.w && pt.y >= btn.y && pt.y <= btn.y + btn.h) {
        initGame(btn.diff); return;
      }
    }
    return;
  }
  if (state.phase !== 'PLAYING') return;

  const s = starAt(pt.x, pt.y);
  state.pointerDown = { x: pt.x, y: pt.y, time: performance.now(), startedOnStar: s ? s.id : null };
  state.dragFrom    = (s && s.owner === PLAYER_ID) ? s.id : null;
  state.dragPos     = { ...pt };
}

function onMove(e) {
  e.preventDefault();
  if (state.phase !== 'PLAYING') return;
  state.dragPos = ptFromEvent(e);
}

function onUp(e) {
  e.preventDefault();
  const pt = ptFromEvent(e);
  const pd = state.pointerDown;
  state.pointerDown = null;
  state.dragFrom    = null;
  state.dragPos     = null;

  if (state.phase !== 'PLAYING' || !pd) return;

  const travel   = Math.hypot(pt.x - pd.x, pt.y - pd.y);
  const duration = performance.now() - pd.time;
  const isTap    = travel <= TAP_MAX_MOVE && duration <= TAP_MAX_MS;

  if (isTap) { handleTap(pt.x, pt.y); return; }

  // Drag from own star → create route
  if (pd.startedOnStar !== null) {
    const src = state.stars[pd.startedOnStar];
    if (src && src.owner === PLAYER_ID) {
      const target = starAt(pt.x, pt.y);
      if (target && target.id !== pd.startedOnStar) {
        createRoute(PLAYER_ID, pd.startedOnStar, target.id);
        state.upgradePanel = null;
      }
    }
    return;
  }

  // Swipe not from a star → cut routes
  if (travel >= SWIPE_MIN_LEN) {
    state.routes
      .filter(r => r.owner === PLAYER_ID && !r._dead)
      .forEach(r => {
        const src = state.stars[r.fromStar], tgt = state.stars[r.toStar];
        if (src && tgt && segmentsIntersect(pd.x, pd.y, pt.x, pt.y, src.x, src.y, tgt.x, tgt.y)) {
          r._dead = true;
        }
      });
  }
}

// ============================================================
// RENDERING
// ============================================================
function render(ts) {
  ctx.clearRect(0, 0, logW, logH);
  drawBg(ts);

  if (state.phase === 'START') {
    drawStartScreen(ts);
    return;
  }

  drawRoutes();
  drawCutGesture();
  drawDragLine();
  drawShips();
  drawStars(ts);
  if (state.upgradePanel !== null) drawUpgradePanel(state.upgradePanel);
  drawHUD();

  if (state.phase === 'WIN')  drawEndScreen(true);
  if (state.phase === 'LOSE') drawEndScreen(false);
}

function drawBg(ts) {
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, logW, logH);
  for (const dot of starfield) {
    const twinkle = 0.65 + 0.35 * Math.sin(ts * 0.00085 + dot.phase);
    ctx.beginPath();
    ctx.arc(dot.x, dot.y, dot.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,210,255,${dot.alpha * twinkle})`;
    ctx.fill();
  }
}

function drawRoutes() {
  for (const route of state.routes) {
    if (route._dead) continue;
    const src = state.stars[route.fromStar];
    const tgt = state.stars[route.toStar];
    if (!src || !tgt) continue;

    const col   = COLORS[route.owner];
    const alpha = route.owner === PLAYER_ID ? 0.6 : 0.35;
    const r = parseInt(col.slice(1,3),16), g = parseInt(col.slice(3,5),16), b = parseInt(col.slice(5,7),16);

    ctx.save();
    ctx.strokeStyle    = `rgba(${r},${g},${b},${alpha})`;
    ctx.lineWidth      = route.owner === PLAYER_ID ? 1.8 : 1.2;
    ctx.shadowBlur     = 5;
    ctx.shadowColor    = col;
    ctx.setLineDash([7, 9]);
    ctx.lineDashOffset = -route.dashOffset;
    ctx.beginPath();
    ctx.moveTo(src.x, src.y);
    ctx.lineTo(tgt.x, tgt.y);
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrowhead at target
    const angle = Math.atan2(tgt.y - src.y, tgt.x - src.x);
    const ax = tgt.x - Math.cos(angle) * (tgt.radius + 5);
    const ay = tgt.y - Math.sin(angle) * (tgt.radius + 5);
    ctx.translate(ax, ay);
    ctx.rotate(angle);
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha + 0.2})`;
    ctx.beginPath();
    ctx.moveTo(7, 0); ctx.lineTo(-5, -3.5); ctx.lineTo(-5, 3.5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function drawCutGesture() {
  if (!state.pointerDown || state.dragFrom !== null || !state.dragPos) return;
  const travel = Math.hypot(state.dragPos.x - state.pointerDown.x, state.dragPos.y - state.pointerDown.y);
  if (travel < 12) return;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,220,80,0.6)';
  ctx.lineWidth   = 2;
  ctx.setLineDash([4, 7]);
  ctx.beginPath();
  ctx.moveTo(state.pointerDown.x, state.pointerDown.y);
  ctx.lineTo(state.dragPos.x, state.dragPos.y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawShips() {
  for (const ship of state.ships) {
    const col = COLORS[ship.owner];
    ctx.save();
    ctx.translate(ship.x, ship.y);
    ctx.rotate(ship.angle);
    ctx.shadowBlur  = 9;
    ctx.shadowColor = col;
    ctx.fillStyle   = col;
    ctx.beginPath();
    ctx.moveTo(7, 0); ctx.lineTo(-4.5, -3.5); ctx.lineTo(-4.5, 3.5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function drawTrajectories() {
  const selId = state.dragFrom ?? state.selected;
  if (selId === null) return;
  const sel = state.stars[selId];
  if (!sel) return;

  ctx.save();
  ctx.setLineDash([5, 9]);
  ctx.lineWidth = 1;
  for (const s of state.stars) {
    if (s.id === selId) continue;
    ctx.strokeStyle = s.owner === AI_ID
      ? 'rgba(239,83,80,0.3)'
      : 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.moveTo(sel.x, sel.y);
    ctx.lineTo(s.x, s.y);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

function drawDragLine() {
  if (state.dragFrom === null || !state.dragPos) return;
  const from   = state.stars[state.dragFrom];
  if (!from) return;
  const target = starAt(state.dragPos.x, state.dragPos.y);
  const tx     = target ? target.x : state.dragPos.x;
  const ty     = target ? target.y : state.dragPos.y;
  const angle  = Math.atan2(ty - from.y, tx - from.x);

  ctx.save();
  ctx.strokeStyle = 'rgba(79,195,247,0.7)';
  ctx.lineWidth   = 2;
  ctx.setLineDash([6, 8]);
  ctx.beginPath();
  ctx.moveTo(from.x, from.y);
  ctx.lineTo(tx, ty);
  ctx.stroke();
  ctx.setLineDash([]);

  // arrowhead
  const tipR = target ? target.radius + 6 : 0;
  const ax   = tx - Math.cos(angle) * tipR;
  const ay   = ty - Math.sin(angle) * tipR;
  ctx.fillStyle = 'rgba(79,195,247,0.85)';
  ctx.translate(ax, ay);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-12, -5);
  ctx.lineTo(-12, 5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawStarPoly(cx, cy, outerR, innerR, points, rotation) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = rotation + (i * Math.PI) / points - Math.PI / 2;
    i === 0 ? ctx.moveTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r)
            : ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
  }
  ctx.closePath();
}

function getThreatAngle(star) {
  const range = star.radius * COMBAT_RANGE_MULT * 2;
  let best = Infinity, angle = null;
  for (const ship of state.ships) {
    if (ship.owner === star.owner || ship.toStar !== star.id) continue;
    const d = Math.hypot(ship.x - star.x, ship.y - star.y);
    if (d <= range && d < best) { best = d; angle = Math.atan2(ship.y - star.y, ship.x - star.x); }
  }
  return angle;
}

function drawStars(ts) {
  const sorted = [...state.stars].sort((a, b) => b.radius - a.radius);
  for (const s of sorted) {
    const col       = COLORS[s.owner];
    const isNeutral = s.owner === NEUTRAL_ID;
    const points    = isNeutral ? 6 : 8;
    const innerR    = s.radius * (isNeutral ? 0.52 : 0.44);

    // Soft ambient glow layers
    if (!isNeutral) {
      ctx.save();
      for (let layer = 3; layer >= 1; layer--) {
        ctx.globalAlpha = 0.07 / layer;
        ctx.fillStyle   = col;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius * (1.3 + 0.35 * layer), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // Star body
    ctx.save();
    ctx.shadowBlur  = isNeutral ? 12 : 30;
    ctx.shadowColor = col;
    const g = ctx.createRadialGradient(s.x - s.radius * 0.25, s.y - s.radius * 0.25, 0, s.x, s.y, s.radius);
    if (isNeutral) {
      g.addColorStop(0, '#aabbcc'); g.addColorStop(0.5, '#445566'); g.addColorStop(1, '#1a2233');
    } else if (s.owner === PLAYER_ID) {
      g.addColorStop(0, '#ccf2ff'); g.addColorStop(0.4, '#4fc3f7'); g.addColorStop(1, '#01579b');
    } else {
      g.addColorStop(0, '#ffccbb'); g.addColorStop(0.4, '#ef5350'); g.addColorStop(1, '#7f0000');
    }
    drawStarPoly(s.x, s.y, s.radius, innerR, points, s.rotation);
    ctx.fillStyle = g;
    ctx.fill();
    drawStarPoly(s.x, s.y, s.radius, innerR, points, s.rotation);
    ctx.strokeStyle = col + 'cc';
    ctx.lineWidth   = 1.5;
    ctx.stroke();
    ctx.restore();

    // Upgrade dots
    if (s.owner === PLAYER_ID && (s.atkLevel > 0 || s.defLevel > 0)) drawUpgradeDots(s);

    // Orbiting ships
    const count    = Math.min(Math.floor(s.units), MAX_ORBIT_SHIPS);
    const orbitR   = s.radius * ORBIT_RADIUS_MULT;
    const threat   = getThreatAngle(s);
    const baseAngle = (ts * 0.00028) + s.id * 0.73;
    if (count > 0 && !isNeutral) {
      for (let i = 0; i < count; i++) {
        let angle;
        if (threat !== null) {
          const t = count === 1 ? 0.5 : i / (count - 1);
          angle   = threat - CLUSTER_SPAN / 2 + t * CLUSTER_SPAN;
        } else {
          angle = baseAngle + (i / count) * Math.PI * 2;
        }
        const ox = s.x + Math.cos(angle) * orbitR;
        const oy = s.y + Math.sin(angle) * orbitR;
        ctx.save();
        ctx.translate(ox, oy);
        ctx.rotate(angle + Math.PI / 2);
        ctx.shadowBlur  = 6;
        ctx.shadowColor = col;
        ctx.fillStyle   = col;
        ctx.beginPath();
        ctx.moveTo(0, -3.5); ctx.lineTo(2.5, 2.5); ctx.lineTo(-2.5, 2.5);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    // Unit count
    ctx.save();
    ctx.font         = `bold ${Math.round(s.radius * 0.5)}px system-ui,sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur   = 6;
    ctx.shadowColor  = 'rgba(0,0,0,0.95)';
    ctx.fillStyle    = '#fff';
    ctx.fillText(Math.floor(s.units), s.x, s.y);
    ctx.restore();
  }
}

function drawFleets(ts) {
  for (const f of state.fleets) {
    const from = state.stars[f.fromStar];
    const to   = state.stars[f.toStar];
    if (!from || !to) continue;

    const col   = COLORS[f.owner];
    const angle = Math.atan2(to.y - from.y, to.x - from.x);

    ctx.save();
    ctx.shadowBlur  = 9;
    ctx.shadowColor = col;
    ctx.fillStyle   = col;

    for (const d of f.dots) {
      const wobX = Math.sin(ts * 0.003 + d.phase) * 2.2;
      const wobY = Math.cos(ts * 0.003 + d.phase) * 2.2;
      const px   = f.x + (-Math.sin(angle) * d.oy) + Math.cos(angle) * d.ox + wobX;
      const py   = f.y + ( Math.cos(angle) * d.oy) + Math.sin(angle) * d.ox + wobY;
      ctx.beginPath();
      ctx.arc(px, py, 2.8, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // fleet unit count
    if (f.units >= 4) {
      const lx = f.x - Math.sin(angle) * 15;
      const ly = f.y + Math.cos(angle) * 15;
      ctx.save();
      ctx.font         = 'bold 10px system-ui,sans-serif';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = col;
      ctx.shadowBlur   = 5;
      ctx.shadowColor  = 'rgba(0,0,0,0.95)';
      ctx.fillText(f.units, lx, ly);
      ctx.restore();
    }
  }
}

function drawUpgradeDots(s) {
  const dotR = 3.2, gap = 8;
  ctx.save();
  for (let i = 0; i < s.atkLevel; i++) {
    const dx = (i - (s.atkLevel - 1) / 2) * gap;
    ctx.beginPath();
    ctx.arc(s.x + dx, s.y - s.radius - 9, dotR, 0, Math.PI * 2);
    ctx.fillStyle = '#42a5f5'; ctx.shadowBlur = 8; ctx.shadowColor = '#42a5f5';
    ctx.fill();
  }
  for (let i = 0; i < s.defLevel; i++) {
    const dx = (i - (s.defLevel - 1) / 2) * gap;
    ctx.beginPath();
    ctx.arc(s.x + dx, s.y + s.radius + 9, dotR, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd54f'; ctx.shadowBlur = 8; ctx.shadowColor = '#ffd54f';
    ctx.fill();
  }
  ctx.restore();
}

function drawUpgradeBtn(x, y, w, h, label, level, cost, canAfford, maxed, col) {
  ctx.save();
  ctx.shadowBlur  = canAfford ? 10 : 0;
  ctx.shadowColor = col;
  ctx.fillStyle   = canAfford ? col + '28' : 'rgba(20,20,40,0.7)';
  ctx.strokeStyle = canAfford ? col : '#333';
  ctx.lineWidth   = 1;
  ctx.beginPath(); roundRect(x, y, w, h, 5); ctx.fill(); ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.fillStyle  = canAfford ? col : '#555';
  ctx.font       = `bold 10px system-ui,sans-serif`;
  ctx.textAlign  = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(maxed ? `${label} MAX` : `${label} L${level + 1}`, x + w / 2, y + 6);
  if (!maxed) {
    ctx.fillStyle = canAfford ? '#ddd' : '#444';
    ctx.font      = '9px system-ui,sans-serif';
    ctx.fillText(`${cost} units`, x + w / 2, y + 20);
  }
  // Level pips
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(x + w / 2 - 9 + i * 9, y + h - 9, 3, 0, Math.PI * 2);
    ctx.fillStyle = i < level ? col : '#333';
    if (i < level) { ctx.shadowBlur = 5; ctx.shadowColor = col; }
    ctx.fill(); ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function drawUpgradePanel(starId) {
  const s = state.stars[starId];
  if (!s || s.owner !== PLAYER_ID) return;
  const pw = 116, ph = 58, br = 8;
  const px = Math.max(4, Math.min(logW - pw - 4, s.x - pw / 2));
  const py = Math.max(4, Math.min(logH - ph - 4, s.y + s.radius + 10));

  ctx.save();
  ctx.fillStyle   = 'rgba(8,10,28,0.92)';
  ctx.strokeStyle = COLORS[PLAYER_ID];
  ctx.lineWidth   = 1.5;
  ctx.shadowBlur  = 12; ctx.shadowColor = COLORS[PLAYER_ID];
  ctx.beginPath(); roundRect(px, py, pw, ph, br); ctx.fill(); ctx.stroke();
  ctx.restore();

  const atkMaxed = s.atkLevel >= 3;
  const atkCost  = !atkMaxed ? UPGRADE_COSTS[s.atkLevel] : null;
  drawUpgradeBtn(px + 2, py + 3, 54, ph - 6, '⚔ ATK', s.atkLevel, atkCost,
    !atkMaxed && s.units >= atkCost + 1, atkMaxed, '#42a5f5');

  const defMaxed = s.defLevel >= 3;
  const defCost  = !defMaxed ? UPGRADE_COSTS[s.defLevel] : null;
  drawUpgradeBtn(px + 60, py + 3, 54, ph - 6, '🛡 DEF', s.defLevel, defCost,
    !defMaxed && s.units >= defCost + 1, defMaxed, '#ffd54f');
}

function drawHUD() {
  const total  = state.stars.length;
  const pCount = state.stars.filter(s => s.owner === PLAYER_ID).length;
  const aCount = state.stars.filter(s => s.owner === AI_ID).length;

  ctx.save();
  ctx.font         = 'bold 14px system-ui,sans-serif';
  ctx.textBaseline = 'top';
  ctx.shadowBlur   = 6;
  ctx.shadowColor  = 'rgba(0,0,0,0.85)';

  // player side (top-left)
  ctx.fillStyle = COLORS[PLAYER_ID];
  ctx.beginPath();
  ctx.arc(14, 15, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillText(`${pCount} / ${total}`, 26, 9);

  // AI side (top-right)
  ctx.textAlign = 'right';
  ctx.fillStyle = COLORS[AI_ID];
  ctx.beginPath();
  ctx.arc(logW - 14, 15, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillText(`${aCount} / ${total}`, logW - 26, 9);

  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawStartScreen(ts) {
  const cx = logW / 2;
  const cy = logH / 2;

  // dim overlay (stars still visible through it)
  ctx.fillStyle = 'rgba(13,13,26,0.78)';
  ctx.fillRect(0, 0, logW, logH);

  // title
  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  const titleSize  = Math.min(54, logW * 0.11);
  ctx.font         = `bold ${titleSize}px system-ui,sans-serif`;
  ctx.shadowBlur   = 35;
  ctx.shadowColor  = '#4fc3f7';
  ctx.fillStyle    = '#4fc3f7';
  ctx.fillText('STARS BATTLE', cx, cy - 120);

  // subtitle
  ctx.font        = `${Math.min(17, logW * 0.038)}px system-ui,sans-serif`;
  ctx.fillStyle   = 'rgba(200,230,255,0.5)';
  ctx.shadowBlur  = 0;
  ctx.fillText('CONQUER THE GALAXY', cx, cy - 74);
  ctx.restore();

  // difficulty buttons
  const btnW   = Math.min(130, logW * 0.28);
  const btnH   = 50;
  const gap    = 14;
  const totalW = btnW * 3 + gap * 2;
  const bx0    = cx - totalW / 2;
  const by     = cy - 12;

  const diffs = [
    { label: 'EASY',   diff: 'easy',   col: '#66bb6a' },
    { label: 'NORMAL', diff: 'normal', col: '#4fc3f7' },
    { label: 'HARD',   diff: 'hard',   col: '#ef5350' },
  ];
  diffButtons = [];

  for (let i = 0; i < 3; i++) {
    const d  = diffs[i];
    const bx = bx0 + i * (btnW + gap);

    ctx.save();
    ctx.shadowBlur  = 16;
    ctx.shadowColor = d.col;

    // border
    ctx.strokeStyle = d.col;
    ctx.lineWidth   = 2;
    ctx.beginPath();
    roundRect(bx, by, btnW, btnH, 9);
    ctx.stroke();

    // fill
    ctx.fillStyle = d.col + '22';
    ctx.beginPath();
    roundRect(bx, by, btnW, btnH, 9);
    ctx.fill();

    // label
    ctx.fillStyle    = d.col;
    ctx.font         = `bold ${Math.min(15, logW * 0.033)}px system-ui,sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(d.label, bx + btnW / 2, by + btnH / 2);
    ctx.restore();

    diffButtons.push({ x: bx, y: by, w: btnW, h: btnH, diff: d.diff });
  }

  // hint text
  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle    = 'rgba(255,255,255,0.28)';
  ctx.font         = `${Math.min(12, logW * 0.028)}px system-ui,sans-serif`;
  ctx.fillText('Tap a star to select · tap again to attack · or drag', cx, by + btnH + 36);
  ctx.restore();
}

function drawEndScreen(win) {
  const cx = logW / 2;
  const cy = logH / 2;

  ctx.fillStyle = win ? 'rgba(0,30,70,0.88)' : 'rgba(50,0,0,0.88)';
  ctx.fillRect(0, 0, logW, logH);

  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowBlur   = 45;
  ctx.shadowColor  = win ? '#4fc3f7' : '#ef5350';
  ctx.fillStyle    = win ? '#4fc3f7' : '#ef5350';
  ctx.font         = `bold ${Math.min(64, logW * 0.14)}px system-ui,sans-serif`;
  ctx.fillText(win ? 'VICTORY' : 'DEFEATED', cx, cy - 28);

  ctx.shadowBlur = 0;
  ctx.fillStyle  = 'rgba(255,255,255,0.42)';
  ctx.font       = `${Math.min(16, logW * 0.036)}px system-ui,sans-serif`;
  ctx.fillText('TAP TO PLAY AGAIN', cx, cy + 44);
  ctx.restore();
}

// ============================================================
// GAME LOOP
// ============================================================
function update(dt) {
  updateRegen(dt);
  updateRoutes(dt);
  updateShips(dt);

  state.aiTimer -= dt * 1000;
  if (state.aiTimer <= 0) {
    aiThink();
    state.aiTimer = DIFFICULTY[state.difficulty].aiInterval;
  }

  checkWinLose();
}

function gameLoop(ts) {
  if (state.lastTime === 0) state.lastTime = ts;
  const dt      = Math.min((ts - state.lastTime) / 1000, 0.1);
  state.lastTime = ts;
  state.tick     = ts;

  if (state.phase === 'PLAYING') update(dt);
  render(ts);
  requestAnimationFrame(gameLoop);
}

// ============================================================
// BOOT
// ============================================================
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
bindInput();
requestAnimationFrame(gameLoop);
</script>

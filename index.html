<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stars Battle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d1a; }
    canvas { display: block; touch-action: none; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script>

// ─── CONSTANTS ─────────────────────────────────────────────────
const C = {
  BG:      0x0d0d1a,
  PLAYER:  0x4fc3f7,
  AI:      0xef5350,
  NEUTRAL: 0x555566,
  TEXT:    '#e0e8ff',
  SUBTEXT: '#888899',
};

const DIFFICULTY = {
  easy:   { stars: 8,  aiInterval: 2000 },
  normal: { stars: 12, aiInterval: 1200 },
  hard:   { stars: 16, aiInterval: 700  },
};

// ─── SHARED: starfield with twinkling ─────────────────────────
function createStarfield(scene) {
  const W   = scene.scale.width;
  const H   = scene.scale.height;
  const rng = new Phaser.Math.RandomDataGenerator(['stars']);

  for (let i = 0; i < 160; i++) {
    const x     = rng.between(0, W);
    const y     = rng.between(0, H);
    const r     = rng.between(1, 10) < 8 ? 0.8 : 1.5;
    const alpha = rng.realInRange(0.25, 0.85);

    // Use individual circle shapes so Tweens can animate alpha
    const dot = scene.add.circle(x, y, r, 0xffffff, alpha);

    // Only ~35% of stars twinkle, keeps it subtle
    if (rng.between(1, 100) <= 35) {
      const dur   = rng.between(1800, 4200);
      const delay = rng.between(0, 3000);
      scene.tweens.add({
        targets:  dot,
        alpha:    { from: alpha * 0.25, to: alpha },
        duration: dur,
        delay,
        yoyo:     true,
        repeat:   -1,
        ease:     'Sine.easeInOut',
      });
    }
  }
}

// ─── BOOT SCENE ────────────────────────────────────────────────
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }
  preload() {}
  create() { this.scene.start('Start'); }
}

// ─── START SCENE ───────────────────────────────────────────────
class StartScene extends Phaser.Scene {
  constructor() { super('Start'); }

  create() {
    const W = this.scale.width;
    const H = this.scale.height;

    createStarfield(this);

    this.add.text(W / 2, H * 0.30, 'STARS BATTLE', {
      fontSize: '46px',
      fontFamily: 'Arial Black, Arial',
      color: '#4fc3f7',
      stroke: '#0d0d1a',
      strokeThickness: 6,
    }).setOrigin(0.5);

    this.add.text(W / 2, H * 0.30 + 58, 'Conquer the galaxy', {
      fontSize: '18px',
      fontFamily: 'Arial',
      color: '#888899',
    }).setOrigin(0.5);

    this.add.text(W / 2, H * 0.62, 'TAP TO PLAY', {
      fontSize: '22px',
      fontFamily: 'Arial',
      color: '#4fc3f7',
    }).setOrigin(0.5);

    this.input.once('pointerdown', () => {
      this.scene.start('Game', { difficulty: 'normal' });
    });
  }
}

// ─── GAME SCENE ────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  init(data) {
    this.difficulty = data.difficulty || 'normal';
  }

  create() {
    const W = this.scale.width;
    const H = this.scale.height;

    createStarfield(this);

    const cfg        = DIFFICULTY[this.difficulty];
    const starData   = generateStarData(W, H, cfg.stars);
    this.starObjects = [];

    const gfx = this.add.graphics();

    for (const s of starData) {
      // Neutral grey circle for now — colors & shapes added in next steps
      gfx.fillStyle(C.NEUTRAL, 1);
      gfx.fillCircle(s.x, s.y, s.radius);
      this.starObjects.push(s);
    }
  }

  update(time, delta) {}
}

// ─── STAR GENERATION ───────────────────────────────────────────
const STAR_RADIUS_MIN = 18;
const STAR_RADIUS_MAX = 38;
const STAR_MARGIN     = 60;  // min distance from screen edge
const STAR_MIN_GAP    = 28;  // min gap between star edges

function generateStarData(W, H, count) {
  const rng    = new Phaser.Math.RandomDataGenerator([`map_${count}`]);
  const placed = [];
  const tries  = 800;

  for (let i = 0; i < count; i++) {
    const r = rng.between(STAR_RADIUS_MIN, STAR_RADIUS_MAX);
    let placed_ok = false;

    for (let t = 0; t < tries; t++) {
      const x = rng.between(STAR_MARGIN + r, W - STAR_MARGIN - r);
      const y = rng.between(STAR_MARGIN + r, H - STAR_MARGIN - r);

      // Rejection: check no overlap with already placed stars
      let ok = true;
      for (const s of placed) {
        const dist = Math.hypot(x - s.x, y - s.y);
        if (dist < s.radius + r + STAR_MIN_GAP) { ok = false; break; }
      }

      if (ok) {
        placed.push({ x, y, radius: r });
        placed_ok = true;
        break;
      }
    }

    // If we can't place — skip (map may have fewer stars than requested)
    if (!placed_ok) console.warn(`Could not place star ${i}`);
  }

  return placed;
}

// ─── PHASER CONFIG ─────────────────────────────────────────────
const config = {
  type: Phaser.AUTO,
  backgroundColor: '#0d0d1a',
  scene: [BootScene, StartScene, GameScene],
  scale: {
    mode: Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: window.innerWidth,
    height: window.innerHeight,
  },
  render: {
    antialias: true,
    pixelArt: false,
    resolution: Math.min(window.devicePixelRatio || 1, 2),
  },
  input: {
    activePointers: 3,
  },
};

const game = new Phaser.Game(config);

window.addEventListener('resize', () => {
  game.scale.resize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>

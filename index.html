<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stars Battle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d1a; }
    canvas { display: block; touch-action: none; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script>

// ─── BOOT SCENE ────────────────────────────────────────────────
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }

  preload() {
    // Assets will be loaded here in future steps
  }

  create() {
    this.scene.start('Start');
  }
}

// ─── START SCENE ───────────────────────────────────────────────
class StartScene extends Phaser.Scene {
  constructor() { super('Start'); }

  create() {
    const { width, height } = this.scale;

    this.add.text(width / 2, height / 2, 'STARS BATTLE', {
      fontSize: '42px',
      fontFamily: 'Arial',
      color: '#4fc3f7',
    }).setOrigin(0.5);

    this.add.text(width / 2, height / 2 + 60, 'Coming soon...', {
      fontSize: '18px',
      fontFamily: 'Arial',
      color: '#888899',
    }).setOrigin(0.5);
  }
}

// ─── GAME SCENE ────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  create() {
    // Game logic will be built here step by step
  }

  update(time, delta) {
    // Game loop
  }
}

// ─── PHASER CONFIG ─────────────────────────────────────────────
const config = {
  type: Phaser.AUTO,
  width: window.innerWidth,
  height: window.innerHeight,
  backgroundColor: '#0d0d1a',
  scene: [BootScene, StartScene, GameScene],
  scale: {
    mode: Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: window.innerWidth,
    height: window.innerHeight,
  },
  render: {
    antialias: true,
    pixelArt: false,
    resolution: Math.min(window.devicePixelRatio || 1, 2),
  },
  input: {
    activePointers: 3,
  },
};

const game = new Phaser.Game(config);

// Auto-resize on orientation change / window resize
window.addEventListener('resize', () => {
  game.scale.resize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>

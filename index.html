<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stars Battle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d1a; }
    canvas { display: block; touch-action: none; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script>

// ─── CONSTANTS ─────────────────────────────────────────────────
const C = {
  BG:      0x0d0d1a,
  PLAYER:  0x4fc3f7,
  AI:      0xef5350,
  NEUTRAL: 0x555566,
  TEXT:    '#e0e8ff',
  SUBTEXT: '#888899',
};

const DIFFICULTY = {
  easy:   { stars: 8,  aiInterval: 2000 },
  normal: { stars: 12, aiInterval: 1200 },
  hard:   { stars: 16, aiInterval: 700  },
};

// ─── SHARED: starfield with twinkling ─────────────────────────
function createStarfield(scene) {
  const W   = scene.scale.width;
  const H   = scene.scale.height;
  const rng = new Phaser.Math.RandomDataGenerator(['stars']);

  for (let i = 0; i < 160; i++) {
    const x     = rng.between(0, W);
    const y     = rng.between(0, H);
    const r     = rng.between(1, 10) < 8 ? 0.8 : 1.5;
    const alpha = rng.realInRange(0.25, 0.85);

    // Use individual circle shapes so Tweens can animate alpha
    const dot = scene.add.circle(x, y, r, 0xffffff, alpha);

    // Only ~35% of stars twinkle, keeps it subtle
    if (rng.between(1, 100) <= 35) {
      const dur   = rng.between(1800, 4200);
      const delay = rng.between(0, 3000);
      scene.tweens.add({
        targets:  dot,
        alpha:    { from: alpha * 0.25, to: alpha },
        duration: dur,
        delay,
        yoyo:     true,
        repeat:   -1,
        ease:     'Sine.easeInOut',
      });
    }
  }
}

// ─── STAR POLYGON HELPER ───────────────────────────────────────
function starPolyPoints(cx, cy, outerR, innerR, points, angleOffset) {
  const pts = [];
  const step = Math.PI / points;
  for (let i = 0; i < points * 2; i++) {
    const r   = i % 2 === 0 ? outerR : innerR;
    const ang = angleOffset + i * step - Math.PI / 2;
    pts.push({ x: cx + Math.cos(ang) * r, y: cy + Math.sin(ang) * r });
  }
  return pts;
}

function drawStarShape(gfx, s) {
  const points     = s.owner === OWNER_NEUTRAL ? 6 : 8;
  const innerRatio = s.owner === OWNER_NEUTRAL ? 0.52 : 0.45;
  const outerR     = s.radius;
  const innerR     = outerR * innerRatio;

  const colorMap = {
    [OWNER_NEUTRAL]: C.NEUTRAL,
    [OWNER_PLAYER]:  C.PLAYER,
    [OWNER_AI]:      C.AI,
  };
  const color = colorMap[s.owner];

  // Glow layers — 3 concentric fills with decreasing alpha
  const glowAlphas = [0.06, 0.12, 0.22];
  const glowScales = [2.2,  1.6,  1.15];
  for (let g = 0; g < 3; g++) {
    const glowPts = starPolyPoints(s.x, s.y, outerR * glowScales[g], innerR * glowScales[g], points, s.rotation);
    gfx.fillStyle(color, glowAlphas[g]);
    gfx.fillPoints(glowPts, true);
  }

  // Solid star fill
  const pts = starPolyPoints(s.x, s.y, outerR, innerR, points, s.rotation);
  gfx.fillStyle(color, 1);
  gfx.fillPoints(pts, true);

  // Bright inner core
  gfx.fillStyle(0xffffff, 0.18);
  gfx.fillCircle(s.x, s.y, innerR * 0.55);
}

// ─── BOOT SCENE ────────────────────────────────────────────────
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }
  preload() {}
  create() { this.scene.start('Start'); }
}

// ─── START SCENE ───────────────────────────────────────────────
class StartScene extends Phaser.Scene {
  constructor() { super('Start'); }

  create() {
    const W = this.scale.width;
    const H = this.scale.height;

    createStarfield(this);

    // Title
    this.add.text(W / 2, H * 0.18, 'STARS BATTLE', {
      fontSize: '46px',
      fontFamily: 'Arial Black, Arial',
      color: '#4fc3f7',
      stroke: '#0d0d1a',
      strokeThickness: 6,
    }).setOrigin(0.5);

    this.add.text(W / 2, H * 0.18 + 56, 'Conquer the galaxy', {
      fontSize: '18px',
      fontFamily: 'Arial',
      color: '#888899',
    }).setOrigin(0.5);

    this.add.text(W / 2, H * 0.42, 'ВЫБЕРИТЕ СЛОЖНОСТЬ', {
      fontSize: '14px',
      fontFamily: 'Arial',
      color: '#556677',
      letterSpacing: 3,
    }).setOrigin(0.5);

    // Difficulty buttons
    const buttons = [
      { key: 'easy',   label: 'ЛЕГКО',    sub: '8 звёзд  ·  медленный AI',  color: '#27ae60', bg: 0x0d2b1a },
      { key: 'normal', label: 'НОРМАЛЬНО', sub: '12 звёзд  ·  средний AI',   color: '#4fc3f7', bg: 0x0d1a2b },
      { key: 'hard',   label: 'СЛОЖНО',   sub: '16 звёзд  ·  быстрый AI',   color: '#ef5350', bg: 0x2b0d0d },
    ];

    const btnW   = Math.min(W * 0.72, 300);
    const btnH   = 64;
    const startY = H * 0.50;
    const gap    = 82;

    buttons.forEach((b, i) => {
      const cx = W / 2;
      const cy = startY + i * gap;

      // Button background
      const bg = this.add.graphics();
      bg.fillStyle(b.bg, 0.85);
      bg.fillRoundedRect(cx - btnW / 2, cy - btnH / 2, btnW, btnH, 12);
      bg.lineStyle(1.5, Phaser.Display.Color.HexStringToColor(b.color).color, 0.6);
      bg.strokeRoundedRect(cx - btnW / 2, cy - btnH / 2, btnW, btnH, 12);

      // Label
      this.add.text(cx, cy - 10, b.label, {
        fontSize: '22px',
        fontFamily: 'Arial Black, Arial',
        color: b.color,
      }).setOrigin(0.5);

      // Sub-label
      this.add.text(cx, cy + 16, b.sub, {
        fontSize: '13px',
        fontFamily: 'Arial',
        color: '#778899',
      }).setOrigin(0.5);

      // Invisible hit zone
      const zone = this.add.zone(cx, cy, btnW, btnH).setInteractive({ useHandCursor: true });

      zone.on('pointerover', () => {
        bg.clear();
        bg.fillStyle(b.bg, 1);
        bg.fillRoundedRect(cx - btnW / 2, cy - btnH / 2, btnW, btnH, 12);
        bg.lineStyle(2, Phaser.Display.Color.HexStringToColor(b.color).color, 1);
        bg.strokeRoundedRect(cx - btnW / 2, cy - btnH / 2, btnW, btnH, 12);
      });

      zone.on('pointerout', () => {
        bg.clear();
        bg.fillStyle(b.bg, 0.85);
        bg.fillRoundedRect(cx - btnW / 2, cy - btnH / 2, btnW, btnH, 12);
        bg.lineStyle(1.5, Phaser.Display.Color.HexStringToColor(b.color).color, 0.6);
        bg.strokeRoundedRect(cx - btnW / 2, cy - btnH / 2, btnW, btnH, 12);
      });

      zone.on('pointerdown', () => {
        this.scene.start('Game', { difficulty: b.key });
      });
    });
  }
}

// ─── GEOMETRY ──────────────────────────────────────────────────
function segmentsIntersect(ax, ay, bx, by, cx, cy, dx, dy) {
  const det = (bx - ax) * (dy - cy) - (by - ay) * (dx - cx);
  if (Math.abs(det) < 1e-10) return false;
  const t = ((cx - ax) * (dy - cy) - (cy - ay) * (dx - cx)) / det;
  const u = ((cx - ax) * (by - ay) - (cy - ay) * (bx - ax)) / det;
  return t >= 0 && t <= 1 && u >= 0 && u <= 1;
}

function routeLineEndpoints(route) {
  const from = route.fromStar;
  const to   = route.toStar;
  const dx   = to.x - from.x;
  const dy   = to.y - from.y;
  const len  = Math.hypot(dx, dy);
  const ux   = dx / len;
  const uy   = dy / len;
  return {
    x1: from.x + ux * from.radius,
    y1: from.y + uy * from.radius,
    x2: to.x   - ux * to.radius,
    y2: to.y   - uy * to.radius,
  };
}

// ─── COMBAT ────────────────────────────────────────────────────
function atkPower(star)   { return 1 + star.atkLevel * 0.25; }
function defFactor(star)  { return 1 / (1 + star.defLevel * 0.25); }

function resolveArrival(ship) {
  const target = ship.toStar;
  if (ship.owner === target.owner) {
    // Friendly reinforcement
    target.units = Math.min(target.units + 1, target.maxUnits);
  } else {
    // Attack: ATK of source owner's star vs DEF of target
    const dmg = atkPower(ship.fromStar) * defFactor(target);
    target.units -= dmg;
    if (target.units < 0) {
      // Capture!
      target.owner = ship.owner;
      target.units = Math.abs(target.units);
      // Reset ATK/DEF on capture (optional but fair)
      target.atkLevel = 0;
      target.defLevel = 0;
    }
  }
}

// ─── SHIP HELPERS ──────────────────────────────────────────────
const SHIP_SPEED = 120; // px/sec
let   shipCounter = 0;

function createShip(owner, fromStar, toStar) {
  const angle = Math.atan2(toStar.y - fromStar.y, toStar.x - fromStar.x);
  return {
    id:       shipCounter++,
    owner,
    fromStar,
    toStar,
    x:        fromStar.x,
    y:        fromStar.y,
    progress: 0,
    angle,
    totalDist: Math.hypot(toStar.x - fromStar.x, toStar.y - fromStar.y),
  };
}

// ─── ROUTE HELPERS ─────────────────────────────────────────────
const ROUTE_DISPATCH_MS = 900;
let   routeCounter      = 0;

function createRoute(owner, fromStar, toStar) {
  return {
    id:            routeCounter++,
    owner,
    fromStar,
    toStar,
    dispatchTimer: 0,
    dashOffset:    0,
  };
}

function routeIsDead(route) {
  // Source changed owner
  if (route.fromStar.owner !== route.owner) return true;
  // Target already belongs to owner
  if (route.toStar.owner === route.owner) return true;
  return false;
}

// ─── GAME SCENE ────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  init(data) {
    this.difficulty = data.difficulty || 'normal';
  }

  create() {
    const W = this.scale.width;
    const H = this.scale.height;

    createStarfield(this);

    const cfg    = DIFFICULTY[this.difficulty];
    this.stars   = generateStars(W, H, cfg.stars);
    this.routes  = [];

    this.ships        = [];
    this.phase        = 'playing';
    this.aiTimer      = 0;
    this.aiInterval   = DIFFICULTY[this.difficulty].aiInterval;

    this.dragFrom     = null;
    this.dragPos      = null;
    this.dragMoved    = false;
    this.dragOrigin   = null;
    this.swipePath    = null;  // [{x,y}] trail for swipe-cut gesture

    this.routeGfx     = this.add.graphics();
    this.dragGfx      = this.add.graphics();
    this.shipGfx      = this.add.graphics();
    this.starGfx      = this.add.graphics();
    this.selectionGfx = this.add.graphics();
    this.unitLabels   = [];
    this.selectedStar = null;
    this.selPulse     = 0;

    for (const s of this.stars) {
      const lbl = this.add.text(s.x, s.y + s.radius + 14, '', {
        fontSize: '14px',
        fontFamily: 'Arial',
        color: '#e0e8ff',
        stroke: '#0d0d1a',
        strokeThickness: 3,
      }).setOrigin(0.5, 0);
      this.unitLabels.push(lbl);
    }

    this.drawStars();
    this.setupInput();
    this.createHUD();
  }

  createHUD() {
    const W = this.scale.width;
    const pad = 16;
    const style = (color) => ({
      fontSize: '15px',
      fontFamily: 'Arial',
      color,
      stroke: '#000000',
      strokeThickness: 3,
    });

    // Player: top-left
    this.hudPlayerStars = this.add.text(pad, pad, '', style('#4fc3f7'));
    this.hudPlayerRoutes = this.add.text(pad, pad + 22, '', style('#4fc3f7'));

    // AI: top-right
    this.hudAIStars = this.add.text(W - pad, pad, '', { ...style('#ef5350'), align: 'right' })
      .setOrigin(1, 0);
    this.hudAIRoutes = this.add.text(W - pad, pad + 22, '', { ...style('#ef5350'), align: 'right' })
      .setOrigin(1, 0);
  }

  updateHUD() {
    const playerStars  = this.stars.filter(s => s.owner === OWNER_PLAYER).length;
    const aiStars      = this.stars.filter(s => s.owner === OWNER_AI).length;
    const playerRoutes = this.routes.filter(r => r.owner === OWNER_PLAYER).length;
    const aiRoutes     = this.routes.filter(r => r.owner === OWNER_AI).length;

    this.hudPlayerStars.setText(`★ ${playerStars}`);
    this.hudPlayerRoutes.setText(`→ ${playerRoutes}`);
    this.hudAIStars.setText(`${aiStars} ★`);
    this.hudAIRoutes.setText(`${aiRoutes} ←`);
  }

  // ── Input ────────────────────────────────────────────────────
  starAt(x, y) {
    for (const s of this.stars) {
      if (Math.hypot(x - s.x, y - s.y) <= s.radius + 8) return s;
    }
    return null;
  }

  setupInput() {
    const DRAG_THRESHOLD = 16; // px before considered a drag

    this.input.on('pointerdown', (ptr) => {
      if (this.phase !== 'playing') return;
      const hit = this.starAt(ptr.x, ptr.y);
      this.dragOrigin = { x: ptr.x, y: ptr.y };
      this.dragMoved  = false;

      if (hit && hit.owner === OWNER_PLAYER) {
        this.dragFrom  = hit;
        this.dragPos   = { x: ptr.x, y: ptr.y };
        this.swipePath = null;
      } else {
        // Starting on empty space or enemy → potential swipe
        this.dragFrom  = null;
        this.swipePath = [{ x: ptr.x, y: ptr.y }];
      }
    });

    this.input.on('pointermove', (ptr) => {
      if (this.dragFrom) {
        this.dragPos = { x: ptr.x, y: ptr.y };
        if (!this.dragMoved) {
          const d = Math.hypot(ptr.x - this.dragOrigin.x, ptr.y - this.dragOrigin.y);
          if (d > DRAG_THRESHOLD) this.dragMoved = true;
        }
      } else if (this.swipePath) {
        this.swipePath.push({ x: ptr.x, y: ptr.y });
      }
    });

    this.input.on('pointerup', (ptr) => {
      if (this.phase !== 'playing') return;
      const hit = this.starAt(ptr.x, ptr.y);

      // ── Swipe-cut check ──
      if (this.swipePath && this.swipePath.length >= 2) {
        const swipeDist = Math.hypot(
          ptr.x - this.swipePath[0].x,
          ptr.y - this.swipePath[0].y
        );
        if (swipeDist > 40) {
          this.cutRoutesAlongSwipe();
        }
        this.swipePath = null;
        return;
      }
      this.swipePath = null;

      if (this.dragFrom) {
        if (this.dragMoved) {
          if (hit && hit !== this.dragFrom) {
            this.tryCreateRoute(this.dragFrom, hit);
          }
          this.dragFrom  = null;
          this.dragPos   = null;
          this.dragMoved = false;
          return;
        }
        // Tap
        if (!hit) {
          this.selectedStar = null;
        } else if (hit.owner === OWNER_PLAYER) {
          this.selectedStar = (this.selectedStar === hit) ? null : hit;
          this.selPulse = 0;
        } else if (this.selectedStar) {
          this.tryCreateRoute(this.selectedStar, hit);
          this.selectedStar = null;
        }
        this.dragFrom  = null;
        this.dragPos   = null;
        this.dragMoved = false;
        return;
      }

      if (!hit) this.selectedStar = null;
    });
  }

  tryCreateRoute(from, to) {
    if (to.owner === OWNER_PLAYER) return;
    const dup = this.routes.find(
      r => r.fromStar === from && r.toStar === to && r.owner === OWNER_PLAYER
    );
    if (!dup) this.routes.push(createRoute(OWNER_PLAYER, from, to));
  }

  cutRoutesAlongSwipe() {
    const path = this.swipePath;
    if (!path || path.length < 2) return;

    // Check every consecutive pair of swipe points against every player route
    const cut = new Set();
    for (let i = 0; i < path.length - 1; i++) {
      const sx1 = path[i].x,   sy1 = path[i].y;
      const sx2 = path[i+1].x, sy2 = path[i+1].y;

      for (const route of this.routes) {
        if (route.owner !== OWNER_PLAYER) continue;
        const { x1, y1, x2, y2 } = routeLineEndpoints(route);
        if (segmentsIntersect(sx1, sy1, sx2, sy2, x1, y1, x2, y2)) {
          cut.add(route);
        }
      }
    }

    if (cut.size === 0) return;

    // Flash the cut lines then remove
    for (const route of cut) {
      const { x1, y1, x2, y2 } = routeLineEndpoints(route);
      const flash = this.add.graphics();
      flash.lineStyle(3, 0xffffff, 0.9);
      flash.beginPath();
      flash.moveTo(x1, y1);
      flash.lineTo(x2, y2);
      flash.strokePath();
      this.tweens.add({
        targets: flash, alpha: 0, duration: 220,
        onComplete: () => flash.destroy(),
      });
    }

    this.routes = this.routes.filter(r => !cut.has(r));
  }

  // ── Drag visual ─────────────────────────────────────────────
  drawDrag() {
    this.dragGfx.clear();
    if (!this.dragFrom || !this.dragPos || !this.dragMoved) return;

    const s  = this.dragFrom;
    const tx = this.dragPos.x;
    const ty = this.dragPos.y;
    const angle = Math.atan2(ty - s.y, tx - s.x);
    const x1 = s.x + Math.cos(angle) * s.radius;
    const y1 = s.y + Math.sin(angle) * s.radius;

    // Dashed line to finger
    const dx  = tx - x1;
    const dy  = ty - y1;
    const len = Math.hypot(dx, dy);
    const ux  = dx / len;
    const uy  = dy / len;

    this.dragGfx.lineStyle(2, C.PLAYER, 0.7);
    const dash = 10, gap = 6, cycle = dash + gap;
    let pos = 0;
    while (pos < len) {
      const end = Math.min(pos + dash, len);
      this.dragGfx.beginPath();
      this.dragGfx.moveTo(x1 + ux * pos, y1 + uy * pos);
      this.dragGfx.lineTo(x1 + ux * end, y1 + uy * end);
      this.dragGfx.strokePath();
      pos += cycle;
    }

    // Small circle at finger tip
    const hitStar = this.starAt(tx, ty);
    const dotColor = (hitStar && hitStar !== s) ? C.PLAYER : 0xffffff;
    this.dragGfx.fillStyle(dotColor, 0.8);
    this.dragGfx.fillCircle(tx, ty, 5);
  }

  // ── Routes ───────────────────────────────────────────────────
  updateRoutes(dt) {
    this.routes = this.routes.filter(r => !routeIsDead(r));
    for (const r of this.routes) {
      r.dashOffset    += 40 * dt;
      r.dispatchTimer += dt * 1000; // ms

      if (r.dispatchTimer >= ROUTE_DISPATCH_MS) {
        r.dispatchTimer = 0;
        // Only dispatch if source has enough units
        if (r.fromStar.units >= 2) {
          r.fromStar.units -= 1;
          this.ships.push(createShip(r.owner, r.fromStar, r.toStar));
        }
      }
    }
  }

  // ── Ships ────────────────────────────────────────────────────
  updateShips(dt) {
    const alive = [];
    for (const ship of this.ships) {
      ship.progress += (SHIP_SPEED * dt) / ship.totalDist;
      ship.x = ship.fromStar.x + (ship.toStar.x - ship.fromStar.x) * ship.progress;
      ship.y = ship.fromStar.y + (ship.toStar.y - ship.fromStar.y) * ship.progress;

      if (ship.progress >= 1) {
        resolveArrival(ship);
      } else {
        alive.push(ship);
      }
    }
    this.ships = alive;
  }

  drawShips() {
    this.shipGfx.clear();
    const size = 6;
    for (const ship of this.ships) {
      const color = ship.owner === OWNER_PLAYER ? C.PLAYER : C.AI;
      const a     = ship.angle;
      // Triangle pointing in direction of travel
      const tip  = { x: ship.x + Math.cos(a) * size,       y: ship.y + Math.sin(a) * size };
      const left = { x: ship.x + Math.cos(a + 2.4) * size * 0.65, y: ship.y + Math.sin(a + 2.4) * size * 0.65 };
      const right= { x: ship.x + Math.cos(a - 2.4) * size * 0.65, y: ship.y + Math.sin(a - 2.4) * size * 0.65 };
      this.shipGfx.fillStyle(color, 0.92);
      this.shipGfx.fillTriangle(tip.x, tip.y, left.x, left.y, right.x, right.y);
    }
  }

  drawRoutes() {
    this.routeGfx.clear();
    for (const r of this.routes) {
      const color = r.owner === OWNER_PLAYER ? C.PLAYER : C.AI;
      const from  = r.fromStar;
      const to    = r.toStar;
      const dx    = to.x - from.x;
      const dy    = to.y - from.y;
      const len   = Math.hypot(dx, dy);
      const ux    = dx / len;
      const uy    = dy / len;

      // Start/end at star edges
      const x1 = from.x + ux * from.radius;
      const y1 = from.y + uy * from.radius;
      const x2 = to.x   - ux * to.radius;
      const y2 = to.y   - uy * to.radius;

      // Draw animated dashed line
      const dashLen  = 10;
      const gapLen   = 6;
      const cycle    = dashLen + gapLen;
      const segLen   = Math.hypot(x2 - x1, y2 - y1);
      const offset   = r.dashOffset % cycle;

      this.routeGfx.lineStyle(1.5, color, 0.55);
      let pos = -offset;
      while (pos < segLen) {
        const start = Math.max(pos, 0);
        const end   = Math.min(pos + dashLen, segLen);
        if (end > start) {
          this.routeGfx.beginPath();
          this.routeGfx.moveTo(x1 + ux * start, y1 + uy * start);
          this.routeGfx.lineTo(x1 + ux * end,   y1 + uy * end);
          this.routeGfx.strokePath();
        }
        pos += cycle;
      }
    }
  }

  // ── Stars ────────────────────────────────────────────────────
  drawSelection() {
    this.selectionGfx.clear();
    if (!this.selectedStar) return;
    const s     = this.selectedStar;
    const pulse = 0.7 + 0.3 * Math.sin(this.selPulse * 4);
    const r     = s.radius * 1.55 + pulse * 4;
    this.selectionGfx.lineStyle(2, C.PLAYER, 0.55 + 0.35 * pulse);
    this.selectionGfx.strokeCircle(s.x, s.y, r);
    this.selectionGfx.lineStyle(1, C.PLAYER, 0.25);
    this.selectionGfx.strokeCircle(s.x, s.y, r + 5);
  }

  drawStars() {
    this.starGfx.clear();
    for (const s of this.stars) {
      drawStarShape(this.starGfx, s);
    }
    for (let i = 0; i < this.stars.length; i++) {
      const s = this.stars[i];
      this.unitLabels[i].setText(Math.floor(s.units));
      this.unitLabels[i].setY(s.y + s.radius + 12);
    }
  }

  // ── Win / Lose ───────────────────────────────────────────────
  checkWinLose() {
    if (this.phase !== 'playing') return;

    const aiAlive = this.stars.some(s => s.owner === OWNER_AI)
      || this.ships.some(s => s.owner === OWNER_AI)
      || this.routes.some(r => r.owner === OWNER_AI);

    const playerAlive = this.stars.some(s => s.owner === OWNER_PLAYER)
      || this.ships.some(s => s.owner === OWNER_PLAYER)
      || this.routes.some(r => r.owner === OWNER_PLAYER);

    if (!aiAlive)     this.endGame('win');
    else if (!playerAlive) this.endGame('lose');
  }

  endGame(result) {
    this.phase = result;
    const W = this.scale.width;
    const H = this.scale.height;

    // Semi-transparent overlay
    const overlay = this.add.graphics();
    overlay.fillStyle(0x000000, 0.62);
    overlay.fillRect(0, 0, W, H);

    const isWin  = result === 'win';
    const title  = isWin ? 'ПОБЕДА' : 'ПОРАЖЕНИЕ';
    const color  = isWin ? '#4fc3f7' : '#ef5350';

    this.add.text(W / 2, H * 0.38, title, {
      fontSize: '52px',
      fontFamily: 'Arial Black, Arial',
      color,
      stroke: '#000000',
      strokeThickness: 8,
    }).setOrigin(0.5);

    const sub = this.add.text(W / 2, H * 0.38 + 76, isWin ? 'Галактика завоёвана!' : 'Флот уничтожен', {
      fontSize: '20px',
      fontFamily: 'Arial',
      color: '#aabbcc',
    }).setOrigin(0.5);

    const replay = this.add.text(W / 2, H * 0.62, 'ИГРАТЬ СНОВА', {
      fontSize: '24px',
      fontFamily: 'Arial Black, Arial',
      color: '#ffffff',
      stroke: '#000000',
      strokeThickness: 4,
      backgroundColor: isWin ? '#1a4a6a' : '#6a1a1a',
      padding: { x: 24, y: 14 },
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    // Pulse the replay button
    this.tweens.add({
      targets:  replay,
      alpha:    { from: 0.65, to: 1 },
      duration: 900,
      yoyo:     true,
      repeat:   -1,
      ease:     'Sine.easeInOut',
    });

    replay.once('pointerdown', () => {
      this.scene.restart({ difficulty: this.difficulty });
    });
  }

  // ── AI ───────────────────────────────────────────────────────
  updateAI(dt) {
    this.aiTimer += dt * 1000;
    if (this.aiTimer < this.aiInterval) return;
    this.aiTimer = 0;

    const MAX_AI_ROUTES = 6;
    const aiStars  = this.stars.filter(s => s.owner === OWNER_AI);
    const aiRoutes = this.routes.filter(r => r.owner === OWNER_AI);

    // ── Defense: reinforce under-attack stars first ──
    for (const target of aiStars) {
      const underAttack = this.ships.some(
        sh => sh.owner === OWNER_PLAYER && sh.toStar === target
      );
      if (underAttack) {
        const helper = aiStars
          .filter(s => s !== target && s.units > 15)
          .sort((a, b) => Math.hypot(a.x - target.x, a.y - target.y) - Math.hypot(b.x - target.x, b.y - target.y))[0];
        if (helper) {
          const dup = aiRoutes.find(r => r.fromStar === helper && r.toStar === target);
          if (!dup && aiRoutes.length < MAX_AI_ROUTES) {
            this.routes.push(createRoute(OWNER_AI, helper, target));
          }
        }
      }
    }

    // ── Offense: score targets and attack ──
    if (aiRoutes.length >= MAX_AI_ROUTES) return;

    // Candidate sources: AI stars with enough units
    const sources = aiStars.filter(s => s.units >= 12);
    if (!sources.length) return;

    // Score every non-AI star as a potential target
    let bestScore = -Infinity;
    let bestSrc   = null;
    let bestTgt   = null;

    for (const src of sources) {
      for (const tgt of this.stars) {
        if (tgt.owner === OWNER_AI) continue;
        const dup = this.routes.find(r => r.fromStar === src && r.toStar === tgt && r.owner === OWNER_AI);
        if (dup) continue;

        const dist      = Math.hypot(src.x - tgt.x, src.y - tgt.y);
        const weakness  = (tgt.maxUnits - tgt.units) / tgt.maxUnits; // 0=full, 1=empty
        const proximity = 1 - dist / 1200;
        const isPlayer  = tgt.owner === OWNER_PLAYER ? 0.4 : 0;
        const score     = weakness * 1.2 + proximity * 0.8 + isPlayer;

        if (score > bestScore) {
          bestScore = score;
          bestSrc   = src;
          bestTgt   = tgt;
        }
      }
    }

    if (bestSrc && bestTgt) {
      this.routes.push(createRoute(OWNER_AI, bestSrc, bestTgt));
    }
  }

  // ── Game loop ────────────────────────────────────────────────
  update(time, delta) {
    const dt = delta / 1000;

    for (const s of this.stars) {
      s.rotation += s.rotSpeed * dt;
      if (s.owner !== OWNER_NEUTRAL) {
        s.units = Math.min(s.units + s.regenRate * dt, s.maxUnits);
      }
    }
    this.selPulse += dt;

    if (this.phase === 'playing') {
      this.updateRoutes(dt);
      this.updateShips(dt);
      this.updateAI(dt);
      this.checkWinLose();
    }

    this.drawDrag();
    this.drawRoutes();
    this.drawShips();
    this.drawStars();
    this.drawSelection();
    this.updateHUD();
  }
}

// ─── STAR GENERATION ───────────────────────────────────────────
const STAR_RADIUS_MIN = 18;
const STAR_RADIUS_MAX = 38;
const STAR_MARGIN     = 60;
const STAR_MIN_GAP    = 28;

const OWNER_NEUTRAL = -1;
const OWNER_PLAYER  =  0;
const OWNER_AI      =  1;

function buildStar(id, x, y, radius, owner) {
  const maxUnits  = Math.round(radius * 3);
  const regenRate = radius * 0.8 / STAR_RADIUS_MAX; // units/sec
  let units;
  if (owner === OWNER_PLAYER || owner === OWNER_AI) {
    units = Math.round(radius * 1.5);
  } else {
    units = Math.round(radius * 0.8); // small neutral garrison
  }
  return {
    id,
    x, y,
    radius,
    owner,
    units,
    regenRate,
    maxUnits,
    atkLevel: 0,
    defLevel: 0,
    rotation: 0,
    rotSpeed: (Math.random() * 0.3 + 0.1) * (Math.random() < 0.5 ? 1 : -1),
  };
}

function generateStars(W, H, count) {
  const rng    = new Phaser.Math.RandomDataGenerator([`map_${count}_${W}`]);
  const pts    = [];
  const tries  = 800;

  // Generate positions with rejection sampling
  for (let i = 0; i < count; i++) {
    const r = rng.between(STAR_RADIUS_MIN, STAR_RADIUS_MAX);
    for (let t = 0; t < tries; t++) {
      const x = rng.between(STAR_MARGIN + r, W - STAR_MARGIN - r);
      const y = rng.between(STAR_MARGIN + r, H - STAR_MARGIN - r);
      let ok = true;
      for (const s of pts) {
        if (Math.hypot(x - s.x, y - s.y) < s.r + r + STAR_MIN_GAP) { ok = false; break; }
      }
      if (ok) { pts.push({ x, y, r }); break; }
    }
  }

  // Assign player = largest star in left half, AI = largest in right half
  const leftPts  = pts.filter(p => p.x < W / 2).sort((a, b) => b.r - a.r);
  const rightPts = pts.filter(p => p.x >= W / 2).sort((a, b) => b.r - a.r);

  const playerPt = leftPts[0];
  const aiPt     = rightPts[0];

  return pts.map((p, i) => {
    let owner = OWNER_NEUTRAL;
    if (p === playerPt) owner = OWNER_PLAYER;
    if (p === aiPt)     owner = OWNER_AI;
    return buildStar(i, p.x, p.y, p.r, owner);
  });
}

// ─── PHASER CONFIG ─────────────────────────────────────────────
const config = {
  type: Phaser.AUTO,
  backgroundColor: '#0d0d1a',
  scene: [BootScene, StartScene, GameScene],
  scale: {
    mode: Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: window.innerWidth,
    height: window.innerHeight,
  },
  render: {
    antialias: true,
    pixelArt: false,
    resolution: Math.min(window.devicePixelRatio || 1, 2),
  },
  input: {
    activePointers: 3,
  },
};

const game = new Phaser.Game(config);

window.addEventListener('resize', () => {
  game.scale.resize(window.innerWidth, window.innerHeight);
});

</script>
